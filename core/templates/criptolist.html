<!DOCTYPE html>
<html>
<head>
    <title>Criptomoedas</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
        }

        h1 {
            text-align: center;
            padding: 20px;
            margin: 0;
            background: #161b22;
            border-bottom: 1px solid #30363d;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
            border-color: #58a6ff;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .symbol {
            color: #8b949e;
            margin-left: 5px;
        }

        .price {
            font-size: 16px;
            color: #58a6ff;
            font-weight: bold;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: #ff7b72;
        }
    </style>
</head>
<body>

<h1>🚀 Top Criptomoedas</h1>

<div class="container">

{% for cripto in criptos %}
    <div class="card">
        <div class="top">
            <div>
                <span class="name">{{ cripto.name }}</span>
                <span class="symbol">({{ cripto.symbol|upper }})</span>
            </div>
            <div class="price">
                ${{ cripto.current_price }}
            </div>
        </div>

    </div>
{% empty %}
    <p class="empty">Erro ao carregar criptomoedas 😢</p>
{% endfor %}

</div>

</body>
</html>
